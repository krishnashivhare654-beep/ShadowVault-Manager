<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowVault | Cyber Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .table { color: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">🛡️ ShadowVault Password Manager</h1>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow">
                    <h4 class="mb-3">Add New Credential</h4>
                    <form action="/add" method="POST">
                        <input type="text" name="website" class="form-control mb-2" placeholder="Website Name" required>
                        <input type="text" name="username" class="form-control mb-2" placeholder="Username/Email" required>
                        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                        <button type="submit" class="btn btn-success w-100">Encrypt & Store</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h3>Stored Encrypted Credentials</h3>
            <table class="table table-dark table-hover mt-3">
                <thead>
                    <tr>
                        <th>Website</th>
                        <th>Username</th>
                        <th>Ciphertext (Encrypted)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for entry in entries %}
                    <tr>
                        <td>{{ entry.website }}</td>
                        <td>{{ entry.username }}</td>
                        <td class="text-break" style="font-family: monospace; color: #00ff00;">
                            {{ entry.encrypted_password }}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
