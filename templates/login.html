<!DOCTYPE html>
<html>
<head>
    <title>ShadowVault | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #0f3443; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }</style>
</head>
<body>
    <div class="card bg-dark p-4 border-info">
        <h2 class="text-center mb-4">🔐 Master Access</h2>
        <form action="/login" method="POST">
            <input type="password" name="master_password" class="form-control mb-3" placeholder="Enter Master Password" required>
            <button type="submit" class="btn btn-info w-100">Unlock Vault</button>
        </form>
    </div>
</body>
</html>
