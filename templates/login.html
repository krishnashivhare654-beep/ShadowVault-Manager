<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowVault | Elite Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; }
        
        body { 
            background: #0a0a0a; 
            color: white; 
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* 3D Background Effect */
        #bg-canvas {
            position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #1a1a2e 0%, #000 100%);
        }

        /* Navigation Bar */
        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-link { color: white !important; margin: 0 15px; transition: 0.3s; }
        .nav-link:hover { color: var(--primary) !important; transform: scale(1.1); }

        /* Modern Glass Card */
        .vault-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }
        .vault-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.3);
            border-color: var(--primary);
        }

        /* Animated Input Boxes */
        .input-group { position: relative; margin-bottom: 30px; }
        .input-group input {
            background: transparent; border: none; border-bottom: 2px solid #333;
            color: white; width: 100%; padding: 10px 0; font-size: 1.1rem; outline: none; transition: 0.4s;
        }
        .input-group label {
            position: absolute; top: 10px; left: 0; pointer-events: none;
            transition: 0.4s; color: #666;
        }
        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -20px; font-size: 0.85rem; color: var(--primary);
        }
        .input-group input:focus { border-bottom: 2px solid var(--primary); }

        .btn-encrypt {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none; border-radius: 12px; padding: 12px; font-weight: bold;
            color: black; transition: 0.4s;
        }
        .btn-encrypt:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🛡️ SHADOWVAULT</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a>
                <a class="nav-link" href="#"><i class="fas fa-info-circle"></i> About</a>
                <a class="nav-link" href="#"><i class="fas fa-question-circle"></i> Help</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="vault-card text-center">
                    <h2 class="mb-5"><i class="fas fa-lock"></i> LOCK DATA</h2>
                    <form action="/add" method="POST">
                        <div class="input-group">
                            <input type="text" name="website" required>
                            <label>Website Name</label>
                        </div>
                        <div class="input-group">
                            <input type="text" name="username" required>
                            <label>Username / Email</label>
                        </div>
                        <div class="input-group">
                            <input type="password" name="password" required>
                            <label>Password</label>
                        </div>
                        <button type="submit" class="btn btn-encrypt w-100">INITIALIZE ENCRYPTION</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="mt-5 vault-card">
            <h3 class="mb-4"><i class="fas fa-database"></i> Secure Database</h3>
            <table class="table table-dark">
                <thead>
                    <tr><th>Service</th><th>Identity</th><th>AES Ciphertext</th></tr>
                </thead>
                <tbody>
                    {% for entry in entries %}
                    <tr>
                        <td>{{ entry.website }}</td>
                        <td>{{ entry.username }}</td>
                        <td class="text-info" style="font-family: monospace;">{{ entry.encrypted_password }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Mouse Move Effect for 3D Background
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.getElementById('bg-canvas').style.setProperty('--x', x + '%');
            document.getElementById('bg-canvas').style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
